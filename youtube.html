<!DOCTYPE html>
<html>

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>YouTube.com Clone</title>
  <style>
    p {
      font-family: roboto, Arial;
    }


    .thumbnail {
      width: 300px;
      margin-left: 0px;
      display: block;
      margin-bottom: 0px;

    }

    .search {
      padding-bottom: 10px;
      padding-top: 10px;
      padding-right: 20px;
      padding-left: 20px;
      background-color: whitesmoke;
      border-radius: 2px;
      border: none;
      display: block;
    }



    .v1 {
      display: inline-block;
      vertical-align: top;
      width: 300px;
      margin-right: 15px;
    }

    .video-dec {
      display: inline-block;
    }

    .video-pro {
      display: inline-block;
      width: 50px;
    }

    .cp {
      display: inline-block;
      width: 50px;
      vertical-align: top;
      margin-top: 10px;
    }

    .ci {
      display: inline-block;
      width: 245px;
      margin-top: 10px;
      margin-left: 1px;
      font-family: arial;
    }

    .pp1 {
      width: 100%;
      margin-top: 2px;
      border-radius: 50px;
    }

    .video-title {
      margin-top: 2px;
      font-family: Arial;
      font-weight: bold;
      font-size: 14px;
    }

    .video-author {
      font-size: 12px;
      color: rgb(96, 96, 96);
      cursor: pointer;
      margin-bottom: 0px;
    }

    .video-stats {
      margin-top: 4px;
      margin-bottom: 12px;
      font-size: 12px;
      color: rgb(96, 96, 96);
    }
  </style>

<body>
  <input type="text" placeholder="Search" class="search">

  <div class="v1">
    <div><img class="thumbnail" src="thumbnail/thumbnail-1.webp"></div>
    <div>
      <div class="cp">
        <img class="pp1" src="channel/channel-1.jpeg">
      </div>
      <div class="ci">
        <p class="video-title">
          Talking Tech and AI with google CEO Sundar Pichai
        </p>
        <p class="video-author">
          Marques Brownel
        </p>
        <p class="video-stats">
          3.4 Million views &#183 6 months ago
        </p>

      </div>
    </div>
  </div>
  <div class="v1">
    <div>
      <img class="thumbnail" src="thumbnail/thumbnail-2.webp">
    </div>
    <div>
      <div class="cp"> <img class="pp1" src="channel/channel-2.jpeg"></div>
      <div class="ci">
        <p class="video-title">
          Don't try to laugh challenge #9
        </p>
        <p class="video-author">
          Marli piller
        </p>
        <p class="video-stats">
          19 Million views &#183 4 years ago
        </p>
      </div>
    </div>

  </div>


 

</body>
</head>

</html>
